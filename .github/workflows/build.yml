name: Build LynxEye
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        run: |
          chmod +x gradlew
          ./gradlew wrapper

      - name: Build Debug APK
        run: ./gradlew clean assembleDebug --no-daemon --no-build-cache

      - uses: actions/upload-artifact@v4
        with:
          name: lynxeye-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
